<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/styles.css" />
    <script src="js/scripts.js" defer></script>
    <title>Ordem de Servico</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  </head>
  <body>
    <div class="container">
      <h1>Ordem de Serviços - MSJR Rep.</h1>

      <form id="formulario">
        <label>Técnico / Equipe</label>
        <input type="text" name="tecnicoEquipe" required />
        <div class="checkbox-group" required>
          <label>
            <input
              type="radio"
              name="tipo"
              value="orçamento"
              onclick="toggleCheckbox(this)"
            />
            Orçamento
          </label>
          <label>
            <input
              type="radio"
              name="tipo"
              value="execução"
              onclick="toggleCheckbox(this)"
            />
            Execução
          </label>
        </div>

        <label>Data</label>
        <input name="dataOrcamento" type="date" required />

        <label>Nome do Cliente</label>
        <input name="nomeCliente" required />

        <label>Setor</label>
        <input name="setor" required />

        <label>Tipo de Equipamento</label>
        <select name="tipoEquipamento" required>
          <option value="">Selecione</option>
          <option>ACJ</option>
          <option>SPLIT</option>
          <option>PISO TETO</option>
          <option>SELF</option>
          <option>FANCOIL</option>
          <option>CHILLER</option>
          <option>K7</option>
          <option>PORTÁTIL</option>
          <option>OUTROS (VIDE OBS)</option>
        </select>

        <label>Marca</label>
        <select id="form" name="marca" required>
          <option value="">Selecione</option>
          <option>CARRIER</option>
          <option>MIDEA</option>
          <option>SPRINGER</option>
          <option>YORK</option>
          <option>LG</option>
          <option>DAIKIN</option>
          <option>ELECTROLUX</option>
          <option>PHILCO</option>
          <option>BRITANIA</option>
          <option>GREE</option>
          <option>AGRATTO</option>
          <option>VIX</option>
          <option>SAMSUNG</option>
          <option>FUJITSU</option>
          <option>TRANE</option>
          <option>PANASONIC</option>
          <option>HITACHI</option>
          <option>CONSUL</option>
          <option>KOMECO</option>
          <option>COMFEE</option>
          <option>MAXIFLEX</option>
          <option>RINETTO</option>
          <option>FONTAINE</option>
          <option>VOGGA</option>
          <option>ADMIRAL</option>
          <option>OLIMPIA SPLENDID</option>
          <option>ELGIN</option>
          <option>TCL</option>
          <option>TEMPSTAR</option>
          <option>SANYO</option>
          <option>TROCALOR</option>
          <option>OUTROS (VIDE OBS)</option>
        </select>

        <label>BTU</label>
        <select name="btu" required>
          <option value="">Selecione</option>
          <option>7.000</option>
          <option>7.500</option>
          <option>9.000</option>
          <option>10.000</option>
          <option>11.000</option>
          <option>12.000</option>
          <option>15.000</option>
          <option>18.000</option>
          <option>21.000</option>
          <option>22.000</option>
          <option>24.000</option>
          <option>30.000</option>
          <option>36.000</option>
          <option>48.000</option>
          <option>56.000</option>
          <option>57.000</option>
          <option>60.000</option>
          <option>72.000</option>
          <option>80.000</option>
          <option>90.000</option>
          <option>120.000</option>
          <option>144.000</option>
          <option>240.000</option>
          <option>3TR</option>
          <option>5TR</option>
          <option>6TR</option>
          <option>10TR</option>
          <option>12TR</option>
          <option>20TR</option>
          <option>OUTROS (VIDE OBS)</option>
        </select>

        <label>N° da Maquina</label>
        <input name="numeroMaquina" />

        <div class="checkbox-group">
          <label>
            <input type="radio" name="tipoServico" value="preventiva" checked />
            Preventiva
          </label>
          <label>
            <input type="radio" name="tipoServico" value="corretiva" />
            Corretiva
          </label>
        </div>

        <label>Descrição do Serviço</label>
        <select name="descricaoServico" id="selectServico" required>
          <option value="">Selecione</option>
        </select>
        <div id="checkboxesContainer"></div>

        <label>Observacão</label>
        <textarea name="observacao" style="resize: none"></textarea>

        <label>Responsável pelo acompanhamento</label>
        <input name="responsavel" required />

        <label>Assinatura do Cliente:</label>
        <canvas
          id="assinatura"
          width="400"
          height="150"
          style="border: 1px solid var(--accent); border-radius: 5px"
        ></canvas>
        <br />
        <button type="button" onclick="limparAssinatura()">
          Limpar Assinatura
        </button>

        <button type="submit">Salvar Item</button>
        <!-- Para isto (um único botão) -->
        <button id="btnExportar">Exportar para Excel/PDF</button>
      </form>
      <p id="contador"></p>
    </div>
  </body>
</html>
